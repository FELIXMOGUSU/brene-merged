<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>House of Brené Admin Catalogue</title><style>body{margin:0;font-family:Arial,sans-serif;background:#0b0b0b;color:#f3efe3}.wrap{max-width:1100px;margin:0 auto;padding:32px 20px}h1{letter-spacing:.08em;text-transform:uppercase}.grid{display:grid;grid-template-columns:380px 1fr;gap:24px}.card{background:#151515;border:1px solid #2a2a2a;padding:20px}label{display:block;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#b7a98a;margin:14px 0 6px}input,textarea,select{width:100%;padding:12px;background:#0d0d0d;border:1px solid #333;color:#fff}textarea{min-height:88px}button{padding:12px 16px;border:none;background:#8b6e42;color:#fff;cursor:pointer;margin-top:14px}button.secondary{background:#222;border:1px solid #444}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}table{width:100%;border-collapse:collapse;font-size:14px}th,td{border-bottom:1px solid #2a2a2a;padding:12px 8px;text-align:left;vertical-align:top}.muted{color:#b0b09e;font-size:13px}.actions{display:flex;gap:8px;flex-wrap:wrap}.hidden{display:none}@media(max-width:900px){.grid{grid-template-columns:1fr}}</style></head><body><div class="wrap"><h1>House of Brené Admin</h1><p class="muted">Password-protected starter admin for adding, editing, and deleting catalogue products.</p><div id="loginCard" class="card"><label>Admin Password</label><input id="adminPassword" type="password" placeholder="Enter admin password"><button id="loginBtn">Unlock Admin</button><p class="muted">Set the password in <code>env.js</code> using <code>ADMIN_PASSWORD</code>.</p></div><div id="adminApp" class="hidden"><div class="grid"><div class="card"><h2 id="formTitle">Add Product</h2><input id="productId" type="hidden"><label>Name</label><input id="name"><label>Description</label><textarea id="description"></textarea><div class="row"><div><label>Price</label><input id="price" type="number" min="0" step="1"></div><div><label>Category</label><select id="category"><option value="sets">Sets</option><option value="sweatshirts">Sweatshirts</option><option value="sweatpants">Sweatpants</option></select></div></div><label>Image URL</label><input id="image_url" placeholder="https://... or relative path"><label>Sizes (comma separated)</label><input id="sizes" value="S,M,L,XL"><label>Colors (comma separated)</label><input id="colors" value="Black"><label>Tags (comma separated)</label><input id="tags" placeholder="new,flagship"><label><input id="in_stock" type="checkbox" checked style="width:auto;margin-right:8px"> In stock</label><div class="actions"><button id="saveBtn">Save Product</button><button id="resetBtn" class="secondary" type="button">Reset</button></div></div><div class="card"><h2>Catalogue</h2><table><thead><tr><th>Product</th><th>Price</th><th>Category</th><th>Stock</th><th>Actions</th></tr></thead><tbody id="productRows"></tbody></table></div></div></div></div><script src="./env.js"></script><script type="module" src="./assets/js/admin.js"></script></body></html>
